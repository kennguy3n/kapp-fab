// print.proto wires the record-print surface. RenderPDF / RenderHTML
// produce a printable document from any record. Output bytes are
// carried directly on the response — the largest practical document
// (a multi-page sales invoice with embedded logo + line items)
// fits in a single unary message, so no streaming is needed here.
syntax = "proto3";

package kapp.v1;

message RenderPrintPDFRequest {
  string ktype = 1;
  string id = 2;
}
message RenderPrintPDFResponse {
  string content_type = 1;
  string file_name = 2;
  bytes pdf = 3;
}

message RenderPrintHTMLRequest {
  string ktype = 1;
  string id = 2;
}
message RenderPrintHTMLResponse {
  // body is the rendered HTML document. UTF-8.
  bytes body = 1;
}

service PrintService {
  rpc RenderPrintPDF(RenderPrintPDFRequest) returns (RenderPrintPDFResponse);
  rpc RenderPrintHTML(RenderPrintHTMLRequest) returns (RenderPrintHTMLResponse);
}
