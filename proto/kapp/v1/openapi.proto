// openapi.proto wires the runtime OpenAPI document endpoint.
// The spec is generated from the active KType registry so the
// document always reflects the live tenant's resource shape.
syntax = "proto3";

package kapp.v1;

message GetOpenAPISpecRequest {}
message GetOpenAPISpecResponse {
  // spec is the rendered OpenAPI 3 document. JSON-encoded.
  bytes spec = 1;
}

service OpenAPIService {
  rpc GetOpenAPISpec(GetOpenAPISpecRequest) returns (GetOpenAPISpecResponse);
}
