// doc.proto wires the Phase F Docs KApp surface — tenant-owned
// artifact documents with append-only version history. Create,
// SaveVersion, and Restore all append a new version row; nothing
// is ever physically deleted so the audit trail stays intact
// across revisions.
syntax = "proto3";

package kapp.v1;

message Document {
  string id = 1;
  string tenant_id = 2;
  string title = 3;
  // doc_type is a free-form tag the UI uses to pick a renderer
  // ("note", "policy", "runbook", "letter", etc.). Empty is
  // valid and renders as a plain doc.
  string doc_type = 4;
  // content is the doc body, JSON-encoded. Schema varies by
  // doc_type — the gRPC layer treats it as opaque.
  bytes content = 5;
  // current_version is the version number of the latest row
  // in the history. Incremented monotonically per save.
  int32 current_version = 6;
  string created_by = 7;
  string created_at = 8;
  string updated_at = 9;
}

message DocumentVersion {
  string id = 1;
  string document_id = 2;
  int32 version = 3;
  string title = 4;
  bytes content = 5;
  // diff is an optional structured diff against the previous
  // version (the wizard populates this so the UI can render
  // a per-revision diff view). JSON-encoded.
  bytes diff = 6;
  string change_summary = 7;
  string saved_by = 8;
  string saved_at = 9;
}

message CreateDocumentRequest {
  string title = 1;
  string doc_type = 2;
  bytes content = 3;
}
message CreateDocumentResponse {
  Document document = 1;
}

message ListDocumentsRequest {}
message ListDocumentsResponse {
  repeated Document documents = 1;
}

message GetDocumentRequest {
  string id = 1;
}
message GetDocumentResponse {
  Document document = 1;
}

message SaveDocumentVersionRequest {
  string id = 1;
  string title = 2;
  bytes content = 3;
  bytes diff = 4;
  string change_summary = 5;
}
message SaveDocumentVersionResponse {
  Document document = 1;
}

message ListDocumentVersionsRequest {
  string id = 1;
}
message ListDocumentVersionsResponse {
  repeated DocumentVersion versions = 1;
}

message RestoreDocumentVersionRequest {
  string id = 1;
  int32 version = 2;
}
message RestoreDocumentVersionResponse {
  Document document = 1;
}

service DocumentService {
  rpc CreateDocument(CreateDocumentRequest) returns (CreateDocumentResponse);
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);
  rpc SaveDocumentVersion(SaveDocumentVersionRequest) returns (SaveDocumentVersionResponse);
  rpc ListDocumentVersions(ListDocumentVersionsRequest) returns (ListDocumentVersionsResponse);
  rpc RestoreDocumentVersion(RestoreDocumentVersionRequest) returns (RestoreDocumentVersionResponse);
}
