// helpdesk_inbound.proto wires the inbound-email ingress that
// turns an SMTP relay's parsed envelope into a helpdesk.ticket
// record. Authenticated by a static shared-secret header on the
// REST side; the gRPC equivalent expects callers to authenticate
// via the same secret in metadata.
syntax = "proto3";

package kapp.v1;

import "kapp/v1/record.proto";

message InboundAttachment {
  string filename = 1;
  string content_type = 2;
  // storage_key is the object-store key (already uploaded by
  // the relay). The handler does not re-fetch the body.
  string storage_key = 3;
  int64 size = 4;
}

message InboundEmail {
  string message_id = 1;
  string to = 2;
  string from = 3;
  string subject = 4;
  string body_text = 5;
  string body_html = 6;
  repeated InboundAttachment attachments = 7;
  string received_at = 8;
}

message ProcessInboundEmailRequest {
  InboundEmail email = 1;
  // shared_secret is the static token the REST surface accepts
  // via X-Helpdesk-Inbound-Token. Carried in the request rather
  // than gRPC metadata so a future non-gRPC client (e.g. an
  // HTTP/2 push from the relay) can match the contract.
  string shared_secret = 2;
}
message ProcessInboundEmailResponse {
  Record record = 1;
}

service HelpdeskInboundService {
  rpc ProcessInboundEmail(ProcessInboundEmailRequest) returns (ProcessInboundEmailResponse);
}
