// pos.proto wires the Phase M Task 6 POS surface. Cart,
// profile, and price-list CRUD ride RecordService under the
// pos.* KTypes; this proto carries only the finalize RPC,
// which promotes a draft pos_invoice into a posted sales
// invoice + payment via the POSPoster.
syntax = "proto3";

package kapp.v1;

import "kapp/v1/record.proto";

message FinalizePOSInvoiceRequest {
  string id = 1;
}
message FinalizePOSInvoiceResponse {
  // record is the updated pos_invoice (status posted, refs to
  // the created ar_invoice + payment populated on data).
  Record record = 1;
}

service POSService {
  rpc FinalizePOSInvoice(FinalizePOSInvoiceRequest) returns (FinalizePOSInvoiceResponse);
}
