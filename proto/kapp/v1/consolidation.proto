// consolidation.proto wires the Phase M operator-scoped
// consolidation surface. Consolidation groups are NOT
// tenant-scoped — the operator (control-plane admin) defines a
// group, picks member tenants, and a Run call sums their trial
// balances into a single presentation currency. The RPCs here
// mount under /api/v1/admin/consolidation in the REST surface
// and require operator auth.
syntax = "proto3";

package kapp.v1;

message EliminationPair {
  string from_tenant = 1;
  string to_tenant = 2;
  string account_code = 3;
}

message ConsolidationGroup {
  string id = 1;
  string name = 2;
  string presentation_currency = 3;
  repeated string member_tenant_ids = 4;
  repeated EliminationPair elimination_pairs = 5;
  string created_at = 6;
  string updated_at = 7;
}

message CreateConsolidationGroupRequest {
  string name = 1;
  string presentation_currency = 2;
  repeated string member_tenant_ids = 3;
  repeated EliminationPair elimination_pairs = 4;
}
message CreateConsolidationGroupResponse {
  ConsolidationGroup group = 1;
}

message RunConsolidationRequest {
  string group_id = 1;
  // as_of is YYYY-MM-DD or RFC3339. Empty means "now".
  string as_of = 2;
}
message RunConsolidationResponse {
  // result is the consolidation payload, JSON-encoded.
  // Shape: { group_id, as_of, presentation_currency,
  //   rows: [{account_code, debit, credit, balance,
  //   contributions: [...]}] }. Opaque on the wire so the
  // report shape can evolve without touching this proto.
  bytes result = 1;
}

service ConsolidationService {
  rpc CreateConsolidationGroup(CreateConsolidationGroupRequest) returns (CreateConsolidationGroupResponse);
  rpc RunConsolidation(RunConsolidationRequest) returns (RunConsolidationResponse);
}
