// view.proto wires per-user, per-KType saved filter/sort/column
// layouts. The RecordListPage in the web UI persists operator
// dashboards via these RPCs so a tenant member's preferred set
// of saved searches follows them across sessions.
syntax = "proto3";

package kapp.v1;

message SavedView {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string ktype = 4;
  string name = 5;
  // filters is the view's filter body, JSON-encoded — same
  // shape the records list endpoint accepts as ?filter=.
  bytes filters = 6;
  string sort = 7;
  // columns is the JSON array of column ids the view renders.
  bytes columns = 8;
  bool is_default = 9;
  // shared makes the view visible to every member of the
  // tenant (not just the owner).
  bool shared = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ListViewsRequest {
  string ktype = 1;
}
message ListViewsResponse {
  repeated SavedView views = 1;
}

message CreateViewRequest {
  string ktype = 1;
  string name = 2;
  bytes filters = 3;
  string sort = 4;
  bytes columns = 5;
  bool is_default = 6;
  bool shared = 7;
}
message CreateViewResponse {
  SavedView view = 1;
}

message GetViewRequest {
  string id = 1;
}
message GetViewResponse {
  SavedView view = 1;
}

// UpdateViewRequest is PATCH-shaped: each optional field pairs
// with a has_X boolean so the wire format expresses
// "omit (preserve existing)" vs "explicit empty/false (clear)"
// the same way the REST surface's *string/*bool fields do.
message UpdateViewRequest {
  string id = 1;
  string name = 2;
  bool has_name = 3;
  bytes filters = 4;
  bool has_filters = 5;
  string sort = 6;
  bool has_sort = 7;
  bytes columns = 8;
  bool has_columns = 9;
  bool is_default = 10;
  bool has_is_default = 11;
  bool shared = 12;
  bool has_shared = 13;
}
message UpdateViewResponse {
  SavedView view = 1;
}

message DeleteViewRequest {
  string id = 1;
}
message DeleteViewResponse {}

service ViewService {
  rpc ListViews(ListViewsRequest) returns (ListViewsResponse);
  rpc CreateView(CreateViewRequest) returns (CreateViewResponse);
  rpc GetView(GetViewRequest) returns (GetViewResponse);
  rpc UpdateView(UpdateViewRequest) returns (UpdateViewResponse);
  rpc DeleteView(DeleteViewRequest) returns (DeleteViewResponse);
}
