// role.proto wires the per-tenant RBAC surface — role
// definitions, permissions on those roles, and user-role
// assignments. The role hierarchy is enforced by the evaluator
// (internal/auth.RoleEvaluator); the gRPC layer only translates
// HTTP into store calls and emits cache-invalidation hooks.
syntax = "proto3";

package kapp.v1;

message Role {
  string name = 1;
  string description = 2;
  // permissions is the role's permission set, JSON-encoded.
  // Stored verbatim in roles.permissions; the evaluator
  // intersects it against the per-row permissions table.
  bytes permissions = 3;
  // parent_role is the role this one inherits from. Empty
  // means root role.
  string parent_role = 4;
  // has_parent_role is the wire-form of the *string semantics
  // in the REST surface — distinguishes "field omitted (keep
  // existing parent)" from "explicit empty (clear parent)".
  // True with parent_role="" means "clear parent"; false means
  // "field omitted".
  bool has_parent_role = 5;
}

message Permission {
  string id = 1;
  string role_name = 2;
  string ktype = 3;
  // action is the verb (read / create / update / delete /
  // approve / etc.).
  string action = 4;
  // conditions is the per-grant condition body, JSON-encoded.
  // Empty object means "no conditions".
  bytes conditions = 5;
  string granted_at = 6;
}

message ListRolesRequest {}
message ListRolesResponse {
  repeated Role roles = 1;
}

message CreateRoleRequest {
  Role role = 1;
}
message CreateRoleResponse {
  Role role = 1;
}

message UpdateRoleRequest {
  string name = 1;
  Role role = 2;
}
message UpdateRoleResponse {
  Role role = 1;
}

message DeleteRoleRequest {
  string name = 1;
}
message DeleteRoleResponse {}

message ListPermissionsRequest {
  string role_name = 1;
}
message ListPermissionsResponse {
  repeated Permission permissions = 1;
}

message GrantPermissionRequest {
  string role_name = 1;
  string ktype = 2;
  string action = 3;
  bytes conditions = 4;
}
message GrantPermissionResponse {
  Permission permission = 1;
}

message RevokePermissionRequest {
  string id = 1;
}
message RevokePermissionResponse {}

message ListUserRolesRequest {
  string user_id = 1;
}
message ListUserRolesResponse {
  repeated string roles = 1;
}

message AssignUserRoleRequest {
  string user_id = 1;
  string role = 2;
}
message AssignUserRoleResponse {}

message RemoveUserRoleRequest {
  string user_id = 1;
  string role = 2;
}
message RemoveUserRoleResponse {}

service RoleService {
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc GrantPermission(GrantPermissionRequest) returns (GrantPermissionResponse);
  rpc RevokePermission(RevokePermissionRequest) returns (RevokePermissionResponse);
  rpc ListUserRoles(ListUserRolesRequest) returns (ListUserRolesResponse);
  rpc AssignUserRole(AssignUserRoleRequest) returns (AssignUserRoleResponse);
  rpc RemoveUserRole(RemoveUserRoleRequest) returns (RemoveUserRoleResponse);
}
