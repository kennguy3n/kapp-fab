# golangci-lint configuration for kapp-fab.
#
# Format: golangci-lint v2 schema.  CI pins v2.5.0
# (.github/workflows/ci.yml).  When bumping the CI version, check the
# v2 changelog for renamed/removed linters and adjust here.
#
# Verification when changing the pinned version or this enable list:
#
#     golangci-lint help linters | grep -E '^(contextcheck|errname|...)'
#     golangci-lint run --timeout=10m ./...
#
# We do not rely on the golangci-lint-action to error on an unknown
# linter name -- some versions silently skip unknown linters, which
# would erode the enforcement we depend on.  Running `help linters`
# against the pinned version confirms every name in the enable list
# below is still a valid linter in that release.
#
# Rationale: the v2 default linter set (errcheck, govet, ineffassign,
# staticcheck, unused) catches the most common issues but is too lax
# for a multi-tenant SaaS where a forgotten error or a leaked context
# can corrupt cross-tenant state.  We enable a deliberate superset
# that covers:
#
#   * Error handling: errcheck, errname, errorlint, nilerr,
#     wrapcheck (off by default — too noisy across packages that
#     legitimately want to expose external API errors verbatim).
#   * Resource leaks: bodyclose, sqlclosecheck, rowserrcheck,
#     noctx.
#   * Concurrency / context propagation: contextcheck,
#     durationcheck.
#   * Defensive constants: predeclared, unconvert, unparam,
#     wastedassign, makezero, prealloc.
#   * Security: gosec.  G104 (unhandled error) is disabled
#     globally because errcheck already covers it and gosec's
#     false-positive rate on G104 is high (especially around
#     intentional `_, _ = w.Write(...)` in HTTP handlers).
#   * Style: gocritic (selective), revive (with exported-name
#     rule), staticcheck.  We do NOT enable godot, godox, gofumpt
#     or gci — they add churn without measurable value at this
#     scale.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - forcetypeassert
    - gocritic
    - gosec
    - makezero
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign

  settings:
    gosec:
      excludes:
        # G104 (unhandled error) duplicates errcheck and produces
        # noise on intentional fire-and-forget writes (HTTP handlers,
        # deferred Close() calls).
        - G104
        # G115 (integer overflow conversion) is broadly applicable
        # and worthwhile to keep enabled.

    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: var-declaration
        - name: package-comments
        - name: dot-imports
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-naming

    gocritic:
      # Disable opinionated style checks; keep correctness checks.
      disabled-checks:
        - ifElseChain
        - whyNoLint
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
        - style

  exclusions:
    # Generated code is excluded so a forgotten errcheck in
    # protoc-gen-go output doesn't fail the whole job.  See
    # buf.gen.yaml for the gen/ destination.
    paths:
      - gen/
      - node_modules/
      - apps/
      - packages/
    rules:
      # Test files: gosec can be noisy on hardcoded credentials in
      # fixtures (G101) and on weak RNGs that are intentional in
      # tests.  forcetypeassert is also overly strict in *_test.go.
      - path: _test\.go
        linters:
          - gosec
          - forcetypeassert
          - unparam
          - errcheck
      # The generated protobuf surface lives under gen/ which is
      # already excluded by paths above, but some integration tests
      # vendor copies of the generated types inline.  Allow them.
      - path: gen/
        linters:
          - revive
          - staticcheck
          - gocritic

issues:
  max-same-issues: 0
