name: ci

# The Kapp kernel spans a Go backend (api/worker/kchat-bridge) and a React
# monorepo (apps/web + packages/*). CI must prove that both halves build,
# that the backend unit tests pass, and that the integration suite — which
# covers RLS isolation, event outbox, audit log, workflow transitions and
# approvals — passes against a real Postgres under the same `kapp_app` /
# `kapp_admin` roles used in production. Lint runs in a separate job so a
# test regression and a style regression fail independently.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # gen/ is gitignored; regenerate Go protobuf bindings from
      # proto/ before every Go step. `make proto-gen` is idempotent
      # and installs the protoc-gen plugins on first run.
      #
      # We install buf via `go install` rather than
      # `bufbuild/buf-action@v1` because the action authenticates
      # against the GitHub REST API on every run (to fetch the
      # latest release metadata, post annotations, etc.) even when
      # `setup_only: true` AND `pr_comment: false` are both set,
      # and intermittently fails with `Bad credentials` on PRs
      # from internal branches whose GITHUB_TOKEN has reduced
      # scope. `go install` only talks to the Go module proxy and
      # is fully version-pinned, matching the blueprint's pinned
      # buf version. (The buf lint/breaking workflow at
      # .github/workflows/buf.yml still uses buf-action because
      # that job intentionally needs PR-comment behaviour.)
      - name: install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.55.1
      - run: make proto-gen
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives us full history so --new-from-rev's
      # merge-base resolution works regardless of how long-lived the
      # PR branch is.  A previous draft used --depth=200, but a PR
      # whose base is >200 commits behind origin/main would silently
      # diff against the tip of main (not the merge base) and
      # over-report lint issues.  Full history is a single curl-
      # equivalent of bandwidth for this repo size; the trade is
      # worth the correctness.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # Regenerate protobuf Go bindings before linting, otherwise
      # golangci-lint sees a missing gen/ package and the build
      # half of the linter (typecheck) fails immediately. Buf is
      # installed via `go install` to avoid the buf-action GitHub
      # API auth flakiness; see the `go` job for full rationale.
      - name: install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.55.1
      - run: make proto-gen
      # Two-stage lint: (1) strict ratchet on changes introduced by
      # this commit / PR — these MUST pass.  (2) full-codebase
      # advisory run captured in the job output for visibility, but
      # marked continue-on-error so legacy findings don't block the
      # ratchet job.  Follow-up PRs drive the legacy count to zero.
      #
      # For `pull_request` events, the ratchet diffs against the PR's
      # base branch (the merge base).  For `push` events (notably
      # push-to-main), there is no base branch in the GitHub payload,
      # so we diff against the parent commit (HEAD~1).  This catches
      # bypasses where someone lands code directly on main without a
      # PR — the previous design used `origin/main` as the base on
      # push events, which made --new-from-rev a no-op because the
      # checkout IS that ref.
      - name: resolve lint base
        run: |
          # fetch-depth: 0 on the checkout step above means we already
          # have the full history locally.  For PR events we still
          # need the base branch tip available as a ref name; fetch
          # it explicitly so origin/$BASE_REF resolves.  --no-tags
          # keeps the network payload minimal.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch --no-tags origin "$BASE_REF"
            # Use the merge-base, not the tip of the base branch,
            # so --new-from-rev diffs against the actual divergence
            # point.  Otherwise a PR rebased onto an outdated main
            # would surface pre-existing issues from main's recent
            # commits as "new".
            MERGE_BASE="$(git merge-base "HEAD" "origin/$BASE_REF")"
            echo "LINT_BASE=${MERGE_BASE}" >> "$GITHUB_ENV"
          else
            # push event: lint the just-pushed commit(s) against the
            # ref's state BEFORE the push.  GitHub sets
            # github.event.before to that SHA.  This is the correct
            # base regardless of merge strategy:
            #   - fast-forward push: before == HEAD~N where N is the
            #     number of new commits.
            #   - merge-commit push (e.g. PR merged via "Create a
            #     merge commit"): before is the pre-merge tip of
            #     main, so the diff captures every line introduced
            #     by the merge — including the second-parent side
            #     that HEAD~1 would miss.
            #   - squash merge: before is the pre-squash tip of
            #     main, so the diff captures the squashed commit's
            #     full contents.
            # The previous heuristic of HEAD~1 was correct only for
            # standard ff or first-parent merges and silently
            # under-reported on second-parent diffs.
            BEFORE_SHA="${{ github.event.before }}"
            # github.event.before is 0000...0000 on a branch's first
            # push.  In that case there is no prior baseline to diff
            # against -- we set LINT_BASE empty and the strict-lint
            # step below treats that as "lint the full codebase
            # strictly", which is the semantically correct behaviour
            # (no baseline = every line is "new").  A previous draft
            # tried to substitute git's canonical empty-tree object,
            # but golangci-lint's --new-from-rev is documented to
            # accept a git revision, not an arbitrary tree object,
            # and silently mis-handling that argument would have
            # made the ratchet a no-op on first push.
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              echo "LINT_BASE=" >> "$GITHUB_ENV"
            else
              echo "LINT_BASE=${BEFORE_SHA}" >> "$GITHUB_ENV"
            fi
          fi
      # On the no-baseline (first-push) path LINT_BASE is empty, in
      # which case we skip --new-from-rev so golangci-lint examines
      # every issue strictly.  Two separate steps with `if:` guards
      # achieve this without conditional argument templating, which
      # the golangci-lint-action does not support.
      - name: golangci-lint (strict, ratcheted)
        if: env.LINT_BASE != ''
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m --new-from-rev=${{ env.LINT_BASE }}
      - name: "golangci-lint (strict, full codebase - first push only)"
        if: env.LINT_BASE == ''
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=10m
      # Advisory full-codebase pass: surfaces pre-existing issues for
      # visibility without blocking the ratchet job.  Skipped on the
      # first-push path because the strict step right above ALSO ran
      # the full codebase (without --new-from-rev) -- running an
      # identical advisory pass would just double the lint time for
      # no extra information.
      - name: golangci-lint (full codebase, advisory)
        if: env.LINT_BASE != ''
        continue-on-error: true
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=10m

  integration:
    name: integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kapp
          POSTGRES_USER: kapp
          POSTGRES_PASSWORD: kapp_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kapp -d kapp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # Integration tests link against the gen/go/kapp/v1 package;
      # regenerate it before running the suite. Buf is installed
      # via `go install` to avoid the buf-action GitHub API auth
      # flakiness; see the `go` job for full rationale.
      - name: install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.55.1
      - run: make proto-gen
      - name: apply migrations
        # Use the ./cmd/migrate CLI rather than the previous psql-loop
        # so this CI step exercises the same code path operators use
        # locally (`make migrate`).  The CLI tracks applied versions
        # in schema_migrations, so a future job that wants to assert
        # idempotency can simply re-run this step.
        env:
          DB_URL: postgres://kapp:kapp_dev@localhost:5432/kapp?sslmode=disable
        run: go run ./cmd/migrate up
      - name: go test -tags=integration
        env:
          KAPP_TEST_DB_URL: postgres://kapp_app:kapp_app_dev@localhost:5432/kapp?sslmode=disable
          KAPP_TEST_ADMIN_DB_URL: postgres://kapp_admin:kapp_admin_dev@localhost:5432/kapp?sslmode=disable
        run: go test -tags=integration -v ./internal/integrationtest/...
      # The migrate CLI's integration tests live in cmd/migrate and
      # need CREATEDB to clone the kapp template into per-test scratch
      # DBs (see freshDB() in main_integration_test.go).  kapp_app
      # does NOT have CREATEDB, so we run this step with the
      # superuser DSN — the same one used by the apply-migrations
      # step above.  Without this step the migrate CLI's freshDB,
      # bootstrap, down-refusal, etc. assertions would not run in
      # CI and regressions would only surface when an operator hit
      # them locally.
      - name: go test -tags=integration (migrate CLI)
        env:
          KAPP_TEST_DB_URL: postgres://kapp:kapp_dev@localhost:5432/kapp?sslmode=disable
        run: go test -tags=integration -count=1 -v ./cmd/migrate/...

  web:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w @kapp/web

  rust-sdk:
    name: rust-sdk (fmt + clippy + test, ${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # MSRV-first matrix: we guarantee the crate builds on the
        # declared `rust-version` (1.86) so downstream consumers on
        # MSRV are not broken by accident, AND that it builds on
        # `stable` so we don't lag behind ecosystem changes (new
        # lints, deprecations, etc.). Two cheap GitHub-hosted runners
        # is a better trade-off than a single MSRV-only job that
        # ignores newer Rust signals (Finding 7 in Devin Review #80).
        toolchain: ["1.86", "stable"]
    defaults:
      run:
        working-directory: packages/sdk-rs
    steps:
      - uses: actions/checkout@v4
      # The build.rs uses protox (pure Rust) for proto compilation,
      # so we don't need protoc on PATH — the rest of the toolchain
      # is a stock Rust install with rustfmt + clippy components.
      - name: install rust toolchain (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - name: cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/sdk-rs/target
          key: ${{ runner.os }}-cargo-sdk-rs-${{ matrix.toolchain }}-${{ hashFiles('packages/sdk-rs/Cargo.toml', 'packages/sdk-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-rs-${{ matrix.toolchain }}-
            ${{ runner.os }}-cargo-sdk-rs-
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      # Build the examples so we catch any drift between the
      # public API and the documented usage in examples/.
      - run: cargo build --examples
