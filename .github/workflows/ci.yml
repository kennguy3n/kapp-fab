name: ci

# The Kapp kernel spans a Go backend (api/worker/kchat-bridge) and a React
# monorepo (apps/web + packages/*). CI must prove that both halves build,
# that the backend unit tests pass, and that the integration suite — which
# covers RLS isolation, event outbox, audit log, workflow transitions and
# approvals — passes against a real Postgres under the same `kapp_app` /
# `kapp_admin` roles used in production. Lint runs in a separate job so a
# test regression and a style regression fail independently.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # gen/ is gitignored; regenerate Go protobuf bindings from
      # proto/ before every Go step. `make proto-gen` is idempotent
      # and installs the two protoc-gen plugins on first run.
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: make proto-gen
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # Regenerate protobuf Go bindings before linting, otherwise
      # golangci-lint sees a missing gen/ package and the build
      # half of the linter (typecheck) fails immediately.
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: make proto-gen
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m

  integration:
    name: integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kapp
          POSTGRES_USER: kapp
          POSTGRES_PASSWORD: kapp_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kapp -d kapp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # Integration tests link against the gen/go/kapp/v1 package;
      # regenerate it before running the suite.
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: make proto-gen
      - name: apply migrations
        env:
          PGPASSWORD: kapp_dev
        run: |
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000001_initial_schema.sql
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000002_admin_role.sql
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000003_forms.sql
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000004_finance_extensions.sql
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000005_inventory.sql
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000006_hr.sql
          psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 \
            -f migrations/000007_lms.sql
          for f in migrations/0000[0-9][0-9]_*.sql; do
            case "$f" in
              migrations/000001_*|migrations/000002_*|migrations/000003_*|migrations/000004_*|migrations/000005_*|migrations/000006_*|migrations/000007_*)
                continue ;;
            esac
            [ -f "$f" ] && psql -h localhost -U kapp -d kapp -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: go test -tags=integration
        env:
          KAPP_TEST_DB_URL: postgres://kapp_app:kapp_app_dev@localhost:5432/kapp?sslmode=disable
          KAPP_TEST_ADMIN_DB_URL: postgres://kapp_admin:kapp_admin_dev@localhost:5432/kapp?sslmode=disable
        run: go test -tags=integration -v ./internal/integrationtest/...

  web:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w @kapp/web
