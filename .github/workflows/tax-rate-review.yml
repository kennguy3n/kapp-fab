name: tax-rate-review

# Annual reminder workflow — opens a tracking issue on January 1st
# of every year with the year-end tax-pack review checklist pre-
# filled. This is intentionally NOT a code-gating workflow: it
# can't tell whether rates ARE correct, only that they SHOULD be
# reviewed. The issue gives the team a single tracker to confirm
# each country's bands / caps / standard deductions / GST rates
# against the relevant revenue service notice for the new fiscal
# year.
#
# Manual trigger is also supported via workflow_dispatch so the
# team can open an off-cycle review (e.g. mid-year rate change in
# a jurisdiction outside the annual cadence).
#
# The checklist tracks the same surface that docs/TAX_PACK_
# MAINTENANCE.md documents: income-tax bands, SSC caps, standard
# deductions, GST/VAT rates, YTD-cap edge cases. The single source
# of truth for the country list is `taxpacks.RegisteredCountries()`
# at runtime; this workflow's checklist mirrors that list but is
# regenerated by hand when a new country is added.

on:
  schedule:
    # Run at 09:00 UTC on January 1st every year. The exact time
    # doesn't matter — the action posts an issue, which will be
    # seen on the team's tracker the next business day regardless.
    - cron: "0 9 1 1 *"
  workflow_dispatch:
    inputs:
      year:
        description: "Fiscal year to review (e.g. 2026). Defaults to the current year."
        required: false
        type: string

permissions:
  issues: write

jobs:
  open-review-issue:
    name: open annual tax-rate review issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: open issue
        uses: actions/github-script@v7
        env:
          REVIEW_YEAR: ${{ github.event.inputs.year }}
        with:
          script: |
            // Determine the fiscal year being reviewed. If the
            // workflow was dispatched manually with a year input
            // use that; otherwise use the current calendar year.
            //
            // The input is coerced through a strict 4-digit regex
            // before use to neutralise any quote / search-query
            // injection vector via the manual dispatch input. The
            // input field is gated to repo-write-permission users by
            // GitHub Actions, so the practical attack surface is
            // already small — this just keeps the search query
            // template clean and defends-in-depth against an
            // attacker with write access who tries to escape into
            // the GitHub Search query syntax via the issue-title
            // interpolation at line 119-121 below.
            const yearInput = process.env.REVIEW_YEAR ?? "";
            const reviewYear = /^[0-9]{4}$/.test(yearInput)
              ? yearInput
              : new Date().getUTCFullYear().toString();

            const title = `Annual tax-rate review — fiscal year ${reviewYear}`;

            // Checklist mirrors docs/TAX_PACK_MAINTENANCE.md and is
            // grouped by region so the team can fan out review
            // work across people familiar with each jurisdiction.
            const body = [
              `Annual tax-rate review issue opened automatically by`,
              `\`.github/workflows/tax-rate-review.yml\` for fiscal year`,
              `**${reviewYear}**. See \`docs/TAX_PACK_MAINTENANCE.md\``,
              `for the per-pack checklist (income-tax bands, SSC caps,`,
              `standard deductions, GST/VAT rates, YTD-cap edge cases).`,
              ``,
              `For every country below, confirm the constants in`,
              `\`internal/hr/taxpacks/<cc>.go\` against the revenue`,
              `service's published rates for ${reviewYear}, and update the`,
              `regression test in \`*_packs_test.go\` if any value`,
              `changes. Tick the box once the pack has been verified.`,
              ``,
              `### Americas`,
              ``,
              `- [ ] **US** — IRS income tax brackets, SS / Medicare wage caps, standard deduction, OASDI base`,
              ``,
              `### APAC`,
              ``,
              `- [ ] **AU** — ATO PAYG bands, SGC quarterly cap, Medicare levy threshold, STSL bands`,
              `- [ ] **NZ** — IR PAYE bands, KiwiSaver employer rate, ACC earner levy, GST registration threshold`,
              `- [ ] **SG** — IRAS bands, CPF wage caps + age tiers, SDL rate`,
              `- [ ] **MY** — LHDN bands, EPF rate, SOCSO bands, EIS bands, MTD schedule`,
              `- [ ] **TH** — RD bands, SSO contribution cap, withholding schedule`,
              `- [ ] **ID** — DJP PPh 21 bands, BPJS Ketenagakerjaan / Kesehatan caps`,
              `- [ ] **VN** — PIT bands, SI / HI / UI caps`,
              `- [ ] **PH** — BIR bands, SSS / PhilHealth / Pag-IBIG schedules`,
              `- [ ] **IN** — IT bands (old + new regime), EPF / ESI caps`,
              ``,
              `### Europe`,
              ``,
              `- [ ] **CH** — Federal tax schedule, ALV solidarity YTD cap, AHV / IV / EO rates, cantonal flat rate baseline`,
              ``,
              `### MENA / GCC`,
              ``,
              `- [ ] **AE** — Pension Authority contribution rates (GCC nationals only)`,
              `- [ ] **SA** — GOSI rate, unemployment insurance, Saudization tier`,
              `- [ ] **QA** — Social insurance rate (GCC nationals only)`,
              `- [ ] **KW** — PIFSS rate, unemployment scheme`,
              `- [ ] **BH** — SIO rate, unemployment scheme`,
              `- [ ] **OM** — PASI rate (GCC nationals only)`,
              ``,
              `---`,
              ``,
              `Once all packs are ticked, close this issue and link to`,
              `the PR(s) that updated the constants. The next review`,
              `issue will open automatically on January 1st of the`,
              `following year.`,
            ].join("\n");

            // Avoid opening a duplicate issue if the workflow runs
            // twice in the same year (e.g. manual + scheduled).
            // The search uses the title format above so any drift
            // in the title will mean the dedupe doesn't fire —
            // that's acceptable because the team will manually
            // close the older issue.
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`,
            });
            if (existing.data.total_count > 0) {
              core.info(`issue with title "${title}" is already open at ${existing.data.items[0].html_url}; skipping`);
              return;
            }

            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["tax-pack", "maintenance", `fiscal-year-${reviewYear}`],
            });
            core.info(`opened issue #${result.data.number} at ${result.data.html_url}`);
