# buf code-generation pipeline for kapp-fab.
#
# Output goes to gen/go/ at the repo root so generated code is
# co-located with the rest of the Go module tree without needing
# a separate go.mod. The path inside gen/go/ follows the proto
# package: `package kapp.v1` produces files under
# gen/go/kapp/v1/.
#
# Both protoc-gen-go (message types) and protoc-gen-go-grpc
# (service stubs) are wired here even though A4 only ships
# message types — wiring both at once means A5 (gRPC server
# implementation) doesn't have to touch buf config at all, it
# just consumes the already-generated service interfaces.
#
# The `local` strategy is used (versus a remote/buf-managed
# plugin) because we want to pin the exact tool versions in
# go.mod / Makefile rather than depend on buf.build's plugin
# catalog being reachable from CI runners.
version: v2
managed:
  enabled: true
  # disable the go_package_prefix override for vendored googleapis
  # files. Those .proto files ship with their own go_package option
  # pointing at google.golang.org/genproto/googleapis/api/...; if we
  # override them with our gen/go prefix the generated `.pb.go`
  # imports a phantom path (gen/go/google/api) that doesn't exist
  # on disk. The genproto module is already in go.mod via the
  # grpc-gateway/v2 dep so leaving its go_package untouched
  # resolves to the right symbols at compile time.
  #
  # `file_option: go_package_prefix` narrows the disable to the
  # single managed option we want to opt out of, leaving the rest
  # (java_package, csharp_namespace, …) at their managed-mode
  # defaults. We don't generate non-Go code today, but scoping
  # the disable precisely keeps the door open without surprising
  # a future contributor who wires up Java/Python/etc. generation
  # and finds googleapis silently un-managed for their language.
  disable:
    - file_option: go_package_prefix
      module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/kennguy3n/kapp-fab/gen/go
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
  # protoc-gen-grpc-gateway emits the HTTP↔gRPC reverse proxy
  # implied by each rpc's google.api.http annotation. The
  # `generate_unbound_methods=false` flag intentionally OMITS
  # gateway stubs for RPCs that don't declare a (google.api.http)
  # mapping — the kapp-fab convention is that every gateway-
  # accessible RPC must declare its REST shape explicitly, so an
  # unmapped RPC is gRPC-only by design (e.g. streaming bulk
  # operations that have no REST analogue).
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=false
