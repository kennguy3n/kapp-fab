version: "3.9"

# The platform follows least privilege for its data plane. Migrations and
# the initial schema bootstrap run as the superuser `kapp` (so they can
# CREATE ROLE, CREATE EXTENSION, GRANT, etc.), but every application
# process (api, worker, kchat-bridge) connects as the non-superuser role
# `kapp_app` — see migrations/000001_initial_schema.sql (CREATE ROLE
# kapp_app) and the Makefile which exposes APP_DB_URL/ADMIN_DB_URL for
# the local runs in `make run-api` / `make run-worker`. Connecting as
# `kapp_app` ensures row-level security is enforced in local development
# the same way it is in production; the superuser connection is kept
# only for schema migrations.
#
# The control plane (tenant list, cross-tenant user lookups) uses the
# `kapp_admin` role with BYPASSRLS — see migrations/000002_admin_role.sql.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kapp
      POSTGRES_USER: kapp
      POSTGRES_PASSWORD: kapp_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

  # Redis backs the distributed rate limiter when the api and
  # agent-tools services are scaled beyond one replica. Set
  # REDIS_URL=redis://redis:6379/0 on those services to opt in;
  # leaving it unset falls back to the in-process limiter.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  # ZK Object Fabric — multi-tenant zero-knowledge S3-compatible
  # storage gateway. Tenants get their own HMAC credentials + bucket;
  # the gateway encrypts each object under a per-tenant DEK so the
  # platform operator (or anyone with raw access to the storage
  # backend) cannot read tenant data without the tenant's credentials.
  #
  # The image is published from kennguy3n/zk-object-fabric and runs
  # the demo profile here (local_fs_dev backend, in-memory tenant
  # store seeded from demo/tenants.json). Object bytes persist in
  # the named volume so dev restarts don't drop attachments.
  #
  # Ports:
  #   :8080 → S3 data plane (Kapp's attachment uploads land here)
  #   :8081 → console API (tenant create + key issue, used by the
  #            setup wizard during tenant provisioning)
  #
  # Set ZK_FABRIC_ENDPOINT=http://zk-fabric:8080 on the api / worker
  # services to opt in. Leaving it unset falls back to the legacy
  # MinIO bucket below.
  zk-fabric:
    image: ghcr.io/kennguy3n/zk-object-fabric:latest
    build:
      context: https://github.com/kennguy3n/zk-object-fabric.git
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - zkdata:/data/objects
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  miniodata:
  zkdata:
